<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kamu Cantik, Kamu Baik! - A love lyrics animation">
    <title>&lt;3</title>
    <link rel="icon" type="image/png" href="assets/love.png">
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: '8bit';
            src: url('fonts/8bit.ttf') format('truetype');
        }

        /* Electron title bar - hidden in browser */
        #custom-title-bar {
            -webkit-app-region: drag;
            height: 35px;
            background-color: #ff9aab;
            color: rgb(255, 220, 220);
            font-size: 1.5em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-family: '8bit', cursive;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 9999;
        }

        #window-controls {
            display: flex;
            -webkit-app-region: no-drag;
        }

        #window-controls button {
            background: transparent;
            border: none;
            padding: 5px;
            margin-right: 10px;
            cursor: pointer;
        }

        #window-controls button img {
            width: 20px;
            height: 20px;
            filter: brightness(0) invert(1);
        }

        #window-controls button:hover img {
            filter: brightness(0.9) invert(1) drop-shadow(0 0 2px white);
        }

        /* Hide title bar in browser mode */
        body.browser-mode #custom-title-bar {
            display: none;
        }

        body.browser-mode {
            padding-top: 0 !important;
        }

        body {
            padding-top: 35px;
            margin: 0;
            padding: 0;
            background: url('cute.gif') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: '8bit', cursive;
            color: white;
            text-shadow: 2px 2px 4px #000;
        }
        #lyrics {
            font-size: 2.8em;
            text-align: center;
            background: rgb(225 145 145 / 50%);
            padding: 30px;
            border-radius: 15px;
            min-width: 80%;
            min-height: 100px;
        }
        .cursor {
            display: inline-block;
            width: 15px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Responsive for mobile */
        @media (max-width: 768px) {
            #lyrics {
                font-size: 1.6em;
                padding: 20px;
                min-width: 85%;
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div id="custom-title-bar">
        <div class="title">Kamu Cantik, Kamu Baik! &lt;3</div>
        <div id="window-controls">
            <button id="home-btn"><img src="assets/home.png" alt="Home"></button>
            <button id="max-btn"><img src="assets/maximize.png" alt="Maximize"></button>
            <button id="close-btn"><img src="assets/close.png" alt="Close"></button>
        </div>
    </div>

    <div id="lyrics"><span id="text"></span><span class="cursor">|</span></div>
    <audio id="bg-music" src="assets/kamucantik.mp3" loop></audio>

    <div id="start-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 10000; cursor: pointer;">
        <div style="background: #ff9aab; padding: 20px 40px; border-radius: 50px; font-size: 1.5em; color: white; box-shadow: 0 0 20px rgba(255,154,171,0.5); animation: pulse 2s infinite;">
            Klik untuk Memulai <3
        </div>
    </div>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        #start-overlay.hidden {
            display: none !important;
        }
    </style>

    <script>
        // Detect if running in Electron or Browser
        const isElectron = typeof window.electronAPI !== 'undefined';
        const music = document.getElementById('bg-music');
        const overlay = document.getElementById('start-overlay');

        if (!isElectron) {
            document.body.classList.add('browser-mode');
        }

        let animationStarted = false;
        function startApp() {
            music.play().then(() => {
                overlay.classList.add('hidden');
                if (!animationStarted) {
                    animationStarted = true;
                    typeLine();
                }
            }).catch(err => {
                console.log("Autoplay blocked or failed, waiting for user interaction...");
            });
        }

        overlay.addEventListener('click', () => {
            startApp();
        });

        document.getElementById('home-btn').addEventListener('click', () => {
            location.reload();
        });
        document.getElementById('max-btn').addEventListener('click', () => {
            if (isElectron) {
                window.electronAPI.sendWindowControl('maximize');
            }
        });
        document.getElementById('close-btn').addEventListener('click', () => {
            if (isElectron) {
                window.electronAPI.sendWindowControl('close');
            }
        });

        const lyrics = [
            "Karena kamu cantik",
            "Kan ku beri segalanya apa yang ku punya",
            "Dan hatimu baik",
            "Sempurnalah duniaku saat kau disisiku",
            "Bukan karena make up di wajahmu",
            "Atau lipstik merah itu",
            "Lembut hati tutur kata",
            "Terciptalah cinta yang ku puja"
        ];

        const settings = [
            { delay: 1300, speed: 90 },
            { delay: 400, speed: 90 },
            { delay: 1200, speed: 115 },
            { delay: 10, speed: 110 },
            { delay: 400, speed: 90 },
            { delay: 1100, speed: 95 },
            { delay: 400, speed: 100 },
            { delay: 1000, speed: 95 }
        ];

        let index = 0;
        let charIndex = 0;
        const display = document.getElementById('text');

        function typeLine() {
            if (index >= lyrics.length) {
                display.textContent = "<3";
                return;
            }

            const line = lyrics[index];
            const config = settings[index];

            if (charIndex < line.length) {
                display.textContent += line.charAt(charIndex);
                charIndex++;
                setTimeout(typeLine, config.speed);
            } else {
                index++;
                charIndex = 0;
                setTimeout(() => {
                    display.textContent = '';
                    typeLine();
                }, config.delay);
            }
        }

        // Try to start automatically (works in some browsers/Electron)
        startApp();
    </script>
</body>
</html>
